<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORWINE | Il tuo Sommelier Digitale</title>
    <!-- Collegamento alla PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3014/3014498.png">
    <!-- Open Graph / Anteprima WhatsApp e Social -->
    <meta property="og:title" content="FORWINE | Il tuo Sommelier Personale">
    <meta property="og:description" content="Rispondi a 3 semplici domande e scopri il vino perfetto per la tua serata.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <meta property="og:url" content="https://tuonome.github.io/forwine/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0a0a0a">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
       <header class="brand-header" id="main-header">
    <h1>FORWINE</h1>
    <p class="slogan">Il tuo Sommelier Personale</p>
    <button onclick="mostraCantina()" style="margin-top: 15px; background: transparent; color: #D4AF37; border: 1px solid #D4AF37; padding: 8px 25px; border-radius: 30px; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 1rem; transition: 0.3s;">
        <i class="fa-solid fa-heart"></i> La Mia Cantina
    </button>
</header>
        <main>
            <!-- Barra di ricerca libera -->
            <section id="hero-trust" style="text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(20,20,20,0.8); border-radius: 12px; border: 1px solid #d4af37;">
                <input type="text" id="ricerca-libera" placeholder="Cerca un vino che ami o un aroma da scoprire..." style="padding: 12px; width: 85%; max-width: 350px; border-radius: 8px; border: none; font-size: 1rem;">
                <button onclick="cercaTestoLibero()" style="padding: 12px 20px; background: #d4af37; color: #111; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Cerca</button>
            </section>

            <!-- LA BARRA DI PROGRESSO -->
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="wizard-container">
                
              <!-- STEP 1: Piatto -->
              <section id="fase-1" class="step-section">
                  <h2 class="step-title">Cosa c'è nel piatto stasera?</h2>
                  <div class="options-grid">
                      <button class="choice-card" onclick="salva('piatto', 'carne_rossa', 1, 2, this)"><i class="fa-solid fa-cow"></i><p>Carne Rossa</p></button>
                      <button class="choice-card" onclick="salva('piatto', 'carne_bianca', 1, 2, this)"><i class="fa-solid fa-drumstick-bite"></i><p>Carne Bianca</p></button>
                      <button class="choice-card" onclick="salva('piatto', 'pesce', 1, 2, this)"><i class="fa-solid fa-fish"></i><p>Pesce</p></button>
                      <button class="choice-card" onclick="salva('piatto', 'primi_pizza', 1, 2, this)"><i class="fa-solid fa-pizza-slice"></i><p>Pasta / Pizza</p></button>
                      <button class="choice-card" onclick="salva('piatto', 'etnico_veg', 1, 2, this)"><i class="fa-solid fa-seedling"></i><p>Etnico / Veg</p></button>
                      <button class="choice-card" onclick="salva('piatto', 'dessert_formaggi', 1, 2, this)"><i class="fa-solid fa-cheese"></i><p>Dolci / Formaggi</p></button>
                  </div>
              </section>

              <!-- STEP 2: Atmosfera -->
              <section id="fase-2" class="step-section" style="display: none;">
                  <h2 class="step-title">Che atmosfera cerchi?</h2>
                  <div class="options-grid">
                      <button class="choice-card" onclick="salva('occasione', 'appuntamento', 2, 3, this)"><i class="fa-solid fa-heart"></i><p>Appuntamento</p></button>
                      <button class="choice-card" onclick="salva('occasione', 'amici_festa', 2, 3, this)"><i class="fa-solid fa-champagne-glasses"></i><p>Amici / Festa</p></button>
                      <button class="choice-card" onclick="salva('occasione', 'famiglia_grigliata', 2, 3, this)"><i class="fa-solid fa-fire-burner"></i><p>Famiglia / Griglia</p></button>
                      <button class="choice-card" onclick="salva('occasione', 'relax', 2, 3, this)"><i class="fa-solid fa-couch"></i><p>Relax Serale</p></button>
                      <button class="choice-card" onclick="salva('occasione', 'aperitivo', 2, 3, this)"><i class="fa-solid fa-martini-glass"></i><p>Aperitivo</p></button>
                      <button class="choice-card" onclick="salva('occasione', 'regalo', 2, 3, this)"><i class="fa-solid fa-gift"></i><p>Regalo Importante</p></button>
                  </div>
              </section>

              <!-- STEP 3: Budget -->
              <section id="fase-3" class="step-section" style="display: none;">
                  <h2 class="step-title">Il tuo budget?</h2>
                  <div class="options-grid">
                      <button class="choice-card" onclick="salva('budget', '15', 3, null, this)"><i class="fa-solid fa-coins"></i><p>Sotto i 15€</p></button>
                      <button class="choice-card" onclick="salva('budget', '30', 3, null, this)"><i class="fa-solid fa-money-bill-wave"></i><p>Fino a 30€</p></button>
                      <button class="choice-card" onclick="salva('budget', '60', 3, null, this)"><i class="fa-solid fa-credit-card"></i><p>Fino a 60€</p></button>
                      <button class="choice-card" onclick="salva('budget', '1000', 3, null, this)"><i class="fa-solid fa-gem"></i><p>Nessun limite</p></button>
                  </div>
              </section>

            </div>

            <!-- SCHERMATA CARICAMENTO WOW -->
            <section id="loading-screen" style="display: none; text-align: center; padding: 60px 0;">
                <i class="fa-solid fa-wine-glass" style="font-size: 3rem; color: #D4AF37; margin-bottom: 20px;"></i>
                <h2 style="font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2rem;">Il Sommelier sta pensando...</h2>
                <p id="loading-text" style="color: #888; margin-top: 15px; font-size: 1.1rem;">Analizzo la cantina in base alle tue scelte...</p>
            </section>

            <!-- RISULTATI CINEMATOGRAFICI -->
            <section id="risultati" style="display: none;">
                <ul id="lista-vini" style="padding: 0;"></ul>
                <div style="text-align: center; margin-top: 40px;">
                    <button onclick="ricomincia()" style="background: transparent; color: #D4AF37; border: 1px solid #D4AF37; padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; cursor: pointer;">↺ Chiedi un altro consiglio</button>
                </div>
            </section>
        </main>
    </div>

    <script src="database.js"></script>
    <script src="motore.js"></script>
    <!-- Avvio del Service Worker per l'offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('✅ Service Worker Registrato!'))
            .catch(err => console.log('❌ Errore Service Worker:', err));
        });
      }
    </script>
</body>
</html>
